<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Room — TravelNest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="index.html" class="logo">Travel<span>Nest</span></a>
    <div id="nav-links"></div>
</nav>

<!-- BOOKING FORM -->
<div class="form-container" style="max-width:550px">
    <h2>📅 Complete Your Booking</h2>

    <div id="alert-box"></div>

    <!-- Room Summary -->
    <div id="room-summary" style="background:#e3f2fd; padding:15px;
         border-radius:8px; margin-bottom:25px"></div>

    <div class="form-group">
        <label>Check-in Date</label>
        <input type="date" id="checkIn" />
    </div>

    <div class="form-group">
        <label>Check-out Date</label>
        <input type="date" id="checkOut" />
    </div>

    <div class="form-group">
        <label>Number of Guests</label>
        <input type="number" id="guests" value="1" min="1" max="10" />
    </div>

    <!-- Price Summary -->
    <div id="price-summary" style="background:#f5f5f5; padding:15px;
         border-radius:8px; margin-bottom:20px">
        <p>Select dates to see total price</p>
    </div>

    <button class="btn btn-success" style="width:100%"
            onclick="confirmBooking()">
        💳 Confirm & Pay
    </button>

    <button class="btn btn-danger" style="width:100%; margin-top:10px"
            onclick="history.back()">
        ← Go Back
    </button>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
    requireAuth();
    updateNavbar();

    // Get selected room from localStorage
    const selectedRoom = JSON.parse(
        localStorage.getItem("selectedRoom") || "{}"
    );

    if (!selectedRoom.roomId) {
        window.location.href = "index.html";
    }

    // Show room summary
    document.getElementById("room-summary").innerHTML = `
        <strong>🏨 Room ${selectedRoom.roomNumber}</strong><br>
        <span>₹${selectedRoom.price}/night</span>
    `;

    // Set minimum date to today
    const today = new Date().toISOString().split("T")[0];
    document.getElementById("checkIn").min = today;
    document.getElementById("checkOut").min = today;

    // Calculate price when dates change
    document.getElementById("checkIn").addEventListener("change", updatePrice);
    document.getElementById("checkOut").addEventListener("change", updatePrice);

    function updatePrice() {
        const checkIn = document.getElementById("checkIn").value;
        const checkOut = document.getElementById("checkOut").value;

        if (checkIn && checkOut) {
            const nights = Math.ceil(
                (new Date(checkOut) - new Date(checkIn)) / (1000 * 60 * 60 * 24)
            );

            if (nights <= 0) {
                document.getElementById("price-summary").innerHTML = `
                    <p style="color:red">Check-out must be after check-in!</p>
                `;
                return;
            }

            const total = nights * selectedRoom.price;
            document.getElementById("price-summary").innerHTML = `
                <p>🌙 Nights: <strong>${nights}</strong></p>
                <p>💰 Price/night: <strong>₹${selectedRoom.price}</strong></p>
                <p style="font-size:18px; color:#43a047; font-weight:bold">
                    Total: ₹${total}
                </p>
            `;
        }
    }

    // Confirm booking
    async function confirmBooking() {
        const checkIn = document.getElementById("checkIn").value;
        const checkOut = document.getElementById("checkOut").value;
        const guests = document.getElementById("guests").value;
        const alertBox = document.getElementById("alert-box");

        if (!checkIn || !checkOut) {
            alertBox.innerHTML = `
                <div class="alert alert-error">Please select dates!</div>
            `;
            return;
        }

        const bookingData = {
            hotelId: parseInt(selectedRoom.hotelId),
            roomId: parseInt(selectedRoom.roomId),
            userEmail: getUserEmail(),
            checkInDate: checkIn,
            checkOutDate: checkOut,
            numberOfGuests: parseInt(guests)
        };

        try {
            alertBox.innerHTML = `
                <div class="alert alert-success">Processing payment... ⏳</div>
            `;

            const booking = await BookingAPI.createBooking(bookingData);

            if (booking.status === "CONFIRMED") {
                alertBox.innerHTML = `
                    <div class="alert alert-success">
                        🎉 Booking Confirmed! Check your email for details.
                    </div>
                `;
                // Clear selected room
                localStorage.removeItem("selectedRoom");
                // Redirect to dashboard after 2 seconds
                setTimeout(() => window.location.href = "dashboard.html", 2000);
            } else {
                alertBox.innerHTML = `
                    <div class="alert alert-error">Booking failed! Try again.</div>
                `;
            }
        } catch (error) {
            alertBox.innerHTML = `
                <div class="alert alert-error">Booking failed! Try again.</div>
            `;
        }
    }
</script>

</body>
</html>
