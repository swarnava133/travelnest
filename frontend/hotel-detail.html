<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Details — TravelNest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="index.html" class="logo">Travel<span>Nest</span></a>
    <div id="nav-links"></div>
</nav>

<!-- HOTEL DETAILS -->
<div class="section">

    <!-- Hotel Info -->
    <div id="hotel-info" class="spinner">Loading hotel...</div>

    <!-- Available Rooms -->
    <h2 class="section-title" style="margin-top:40px">Available Rooms</h2>
    <div id="rooms-container" class="rooms-grid">
        <div class="spinner">Loading rooms...</div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
    requireAuth();
    updateNavbar();

    // Get hotel id from URL
    // URL looks like: hotel-detail.html?id=1
    const urlParams = new URLSearchParams(window.location.search);
    const hotelId = urlParams.get("id");

    if (!hotelId) {
        window.location.href = "index.html";
    }

    // Load hotel details
    async function loadHotelDetail() {
        try {
            const hotel = await HotelAPI.getHotelById(hotelId);

            document.getElementById("hotel-info").innerHTML = `
                <div style="background:white; border-radius:12px;
                            padding:30px; box-shadow:0 4px 15px rgba(0,0,0,0.1)">
                    <img src="${hotel.imageUrl || 'https://via.placeholder.com/800x300?text=' + hotel.name}"
                         style="width:100%; height:300px; object-fit:cover;
                                border-radius:8px; margin-bottom:20px"
                         onerror="this.src='https://via.placeholder.com/800x300?text=Hotel'">
                    <h1 style="color:#1a73e8">${hotel.name}</h1>
                    <p>📍 ${hotel.address}, ${hotel.city}</p>
                    <p style="margin-top:10px">${hotel.description}</p>
                    <p style="color:#ffa000; font-weight:bold; margin-top:10px">
                        ⭐ ${hotel.rating}/5
                    </p>
                </div>
            `;

            // Load available rooms
            loadRooms();
        } catch (error) {
            document.getElementById("hotel-info").innerHTML = `
                <div class="alert alert-error">Failed to load hotel!</div>
            `;
        }
    }

    // Load available rooms
    async function loadRooms() {
        try {
            const rooms = await HotelAPI.getAvailableRooms(hotelId);
            const container = document.getElementById("rooms-container");

            if (!rooms || rooms.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-error">No rooms available!</div>
                `;
                return;
            }

            container.innerHTML = rooms.map(room => `
                <div class="room-card">
                    <h4>Room ${room.roomNumber}</h4>
                    <span class="badge badge-available">✅ Available</span>
                    <p><strong>Type:</strong> ${room.roomType}</p>
                    <p><strong>Capacity:</strong> ${room.capacity} guests</p>
                    <p>${room.description || ''}</p>
                    <p class="price">₹${room.pricePerNight}/night</p>
                    <button class="btn btn-primary" style="width:100%; margin-top:10px"
                            onclick="bookRoom(${room.id}, ${room.pricePerNight}, '${room.roomNumber}')">
                        Book Now
                    </button>
                </div>
            `).join("");
        } catch (error) {
            document.getElementById("rooms-container").innerHTML = `
                <div class="alert alert-error">Failed to load rooms!</div>
            `;
        }
    }

    // Book room → go to booking page
    function bookRoom(roomId, price, roomNumber) {
        // Save booking details to localStorage
        localStorage.setItem("selectedRoom", JSON.stringify({
            roomId, price, roomNumber, hotelId
        }));
        window.location.href = "booking.html";
    }

    loadHotelDetail();
</script>

</body>
</html>
