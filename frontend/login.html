<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — TravelNest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="index.html" class="logo">Travel<span>Nest</span></a>
    <div id="nav-links"></div>
</nav>

<!-- LOGIN FORM -->
<div class="form-container">
    <h2>🔐 Login</h2>

    <div id="alert-box"></div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
    </div>

    <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">
        Login
    </button>

    <p style="text-align:center; margin-top:20px">
        Don't have an account?
        <a href="register.html" style="color:#1a73e8">Register here</a>
    </p>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
    updateNavbar();

    // Redirect if already logged in
    if (isLoggedIn()) {
        window.location.href = "index.html";
    }

    async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const alertBox = document.getElementById("alert-box");

        if (!email || !password) {
            alertBox.innerHTML = `
                <div class="alert alert-error">Please fill all fields!</div>
            `;
            return;
        }

        try {
            const response = await UserAPI.login(email, password);

            if (response.token) {
                // Save token and redirect
                saveUserData(response.token, response.email, response.role);
                alertBox.innerHTML = `
                    <div class="alert alert-success">Login successful! Redirecting...</div>
                `;
                setTimeout(() => window.location.href = "index.html", 1000);
            } else {
                alertBox.innerHTML = `
                    <div class="alert alert-error">Invalid email or password!</div>
                `;
            }
        } catch (error) {
            alertBox.innerHTML = `
                <div class="alert alert-error">Login failed! Try again.</div>
            `;
        }
    }

    // Allow Enter key to login
    document.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleLogin();
    });
</script>

</body>
</html>
