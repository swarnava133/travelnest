<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — TravelNest</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #081C15, #1B4332);
            min-height: 100vh;
        }
        .form-container {
            border-top: 4px solid #D4AF37;
        }
        .form-link {
            color: #1B4332;
            font-weight: bold;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">Travel<span>Nest</span></a>
    <div id="nav-links"></div>
</nav>

<div class="form-container">
    <h2>🔐 Welcome Back</h2>
    <p style="text-align:center; color:#666; margin-bottom:25px">
        Login to access luxury hotels
    </p>

    <div id="alert-box"></div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
    </div>

    <button class="btn btn-primary" style="width:100%; font-size:16px"
            onclick="handleLogin()">
        Login →
    </button>

    <p style="text-align:center; margin-top:25px; color:#666">
        Don't have an account?
        <a href="register.html" class="form-link">Register here</a>
    </p>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
    updateNavbar();
    if (isLoggedIn()) window.location.href = "index.html";

    async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const alertBox = document.getElementById("alert-box");

        if (!email || !password) {
            alertBox.innerHTML = `
                <div class="alert alert-error">Please fill all fields!</div>
            `;
            return;
        }

        try {
            alertBox.innerHTML = `
                <div class="alert" style="background:#E8F5E9; color:#2E7D32">
                    Logging in...
                </div>
            `;
            const response = await UserAPI.login(email, password);

            if (response.token) {
                saveUserData(response.token, response.email, response.role);
                alertBox.innerHTML = `
                    <div class="alert alert-success">
                        ✅ Login successful! Redirecting...
                    </div>
                `;
                setTimeout(() => window.location.href = "index.html", 1000);
            } else {
                alertBox.innerHTML = `
                    <div class="alert alert-error">
                        Invalid email or password!
                    </div>
                `;
            }
        } catch (error) {
            alertBox.innerHTML = `
                <div class="alert alert-error">Login failed! Try again.</div>
            `;
        }
    }

    document.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleLogin();
    });
</script>

</body>
</html>
