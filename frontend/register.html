<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — TravelNest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="index.html" class="logo">Travel<span>Nest</span></a>
    <div id="nav-links"></div>
</nav>

<!-- REGISTER FORM -->
<div class="form-container">
    <h2>📝 Create Account</h2>

    <div id="alert-box"></div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" />
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create a password" />
    </div>

    <button class="btn btn-primary" style="width:100%" onclick="handleRegister()">
        Register
    </button>

    <p style="text-align:center; margin-top:20px">
        Already have an account?
        <a href="login.html" style="color:#1a73e8">Login here</a>
    </p>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
    updateNavbar();

    async function handleRegister() {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const alertBox = document.getElementById("alert-box");

        if (!name || !email || !password) {
            alertBox.innerHTML = `
                <div class="alert alert-error">Please fill all fields!</div>
            `;
            return;
        }

        try {
            const response = await UserAPI.register(name, email, password);

            if (response === "User registered successfully!") {
                alertBox.innerHTML = `
                    <div class="alert alert-success">
                        Registered! Redirecting to login...
                    </div>
                `;
                setTimeout(() => window.location.href = "login.html", 1500);
            } else {
                alertBox.innerHTML = `
                    <div class="alert alert-error">${response}</div>
                `;
            }
        } catch (error) {
            alertBox.innerHTML = `
                <div class="alert alert-error">Registration failed!</div>
            `;
        }
    }
</script>

</body>
</html>
